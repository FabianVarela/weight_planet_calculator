name: weight_planet_calculator
description: Weight planet calculator

version: 1.0.0+1

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  collection: ^1.19.1
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  google_fonts: ^8.0.2

dev_dependencies:
  build_runner: ^2.13.1
  flutter_gen_runner: ^5.13.0+1
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter_gen:
  output: lib/styles/generated/
  line_length: 80

  integrations:
    image: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
