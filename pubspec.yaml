name: weight_planet_calculator
description: Weight planet calculator

version: 1.0.0+1

environment:
  sdk: ^3.12.0
  flutter: ^3.44.0

dependencies:
  collection: ^1.19.1
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  flutter_shaders: ^0.1.3
  google_fonts: ^8.1.0

dev_dependencies:
  build_runner: ^2.15.0
  flutter_gen_runner: ^5.14.1
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter_gen:
  output: lib/styles/generated/
  line_length: 80

  integrations:
    image: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/planets/

  shaders:
    - shaders/mercury.frag
    - shaders/venus.frag
    - shaders/earth.frag
    - shaders/mars.frag
    - shaders/jupiter.frag
    - shaders/saturn.frag
    - shaders/uranus.frag
    - shaders/neptune.frag